EDFuqk/kkkfQMOGHUCAQiVAVLm/vk5Ih70Z9JM8X7IAQH/v1r4Jkgc/WDY9QGCyIUAaCF5AxG9AQHExNED4nYJAsDUlQHaMLEDPrT5ARQ9UP9QtH7waVOc9mpIjvoWuiD9apCo/","dtype":"float32","order":"little","shape":[150]},"UMAP dim2":{"__ndarray__":"qdj9QK/Z5UAKiudA31PfQO4vBUHqVgNBCc3mQKaivEA/GuhAdvK4QIok6kAAcr9AC5+3QA3UukDoRdNA98PbQNYO4UD8kctArUPmQOgP0EDONfJAHnzuQNDp60CHw/RA4dbMQN0h2UBA0MxA+v7MQOZx2UAH7+VAcJzUQA//4kAFwddA6cX7QBkY5EDKpQNBWUD8QBdTBUFYZQFBVgkBQUzW/kDxUgZBe/z/QJ2r90BQnudAM9r7QFKq+EDC4vlAYvnuQM/h3ECMHOhAEcnaQNTy70DHFwNB6ebrQKqc3EDAmPxA5jL8QOiazED2Z+dAq13hQEVY9kCV3MBA0fW/QJVizkCEAMBAxirBQBScykAU9cZAJPWmQA/JqUC1MsJAY13AQM6uw0DfccNAN/TEQJt3xECuP6VAykreQGc0zkAU69JAR23VQMGw1kCM881AupWYQF7uQEB2ccRAYmU9QPkmlUCLlUJAp0qeQGNAnEBsQJlATOzpQFcQHUDkSAZA6z0hQHYrIUD8lTpALeIGQIsoCECGF1RAZmpIQOCpG0DqbWdAq802QH1ITkCPDFxARYDfQPT6YkBlRHZAOPxOQFRIS0Cs6ohA2iyCQJoSiUC8UH5AbcBOQCEbUkAQXzRABppVQPFFhUACiDVAdUduQKBUgEBBQHZAoS+QQH0YiUAWBZBA9LtNQAzlg0C1S1hANruJQKmmWEDo1mRA2QQOQPlsPkAEyyxAZTwOQFIJOkBPdadAkn4zQCWmS0DTvBFAfd5jQPX7bED9VHJA5clHQKrwX0Bb2WlA","dtype":"float32","order":"little","shape":[150]},"cause":["You did not know half the questions on your pre-med quiz, even though you had studied hard and felt like you knew the material well. It turned out your section leader had forgotten to assign several of the main readings that were tested on that week's quiz. However, the section leader refused to raise your grade.","You were on a train for six hours. You sat in the quiet car hoping to catch up on some work you were missing while traveling. For the duration of the trip, a young girl was on the phone gossiping loudly about the guy she had met the night before.","You were rushing to grab a muffin before heading into work. The woman in front of you was talking on the phone and didn't realize you were next. The woman then dilly dallied in deciding what to order. To avoid being late to work, you had to step out of line without your breakfast.","At Starbucks, you waited in a long line to make your order, and waited another 5 minutes for your drink. When the barista called your name, he handed you a coffee instead of the decaf tea you had ordered. You were already late due to the wait, so you had to leave without replacing your order.","Your friend had offered you a ride to the train station. You had agreed on a 7:00am pickup, but by 7:30 there was no sign of your friend. You called several times, and finally your friend answered; she had overslept. Your friend hurried over and you raced to the station, but you still missed the train.","Last week, you went to a comedy show with your friends from class. To make things easier, you bought everyone's ticket with your credit card, and asked them to pay you back the following day. Despite several reminders, none of your friends had paid you back for the show.","You agreed to organize a holiday party for your office, and made a doodle poll to find a date that would work for everyone's schedules. Although you sent several emails reminding your colleagues about the poll, only 3 of your 20 officemates took the time to fill in their availability.","You did not spend enough time studying for your final exam, and was unsure about the answers for many of the questions. You waited by your computer the day the grades would be posted, knowing you needed at least a B- to pass the course.","For months, you had been struggling to keep up with your various projects at work. One week, the company announced that they would be making massive payroll cuts. The next day, your boss asked you to come into his office and to close the door behind you.","You always avoided the doctor's office because you really disliked needles. One summer, you were traveling to Kenya for a project, and was told you needed a series of tests and vaccinations before you could go. You reluctantly called the travel clinic and scheduled an appointment for the following week.","You were very shy. You didn't like crowds and never spoke up in class. One morning, your social studies teacher told you that you needed to give a presentation in front of the entire school during their annual American History assembly the following week.","You were struggling in your Algebra class but did not want to tell your parents, who were very strict about academic success. You received a C on your report card and needed a parent signature. You waited at the kitchen table for your mom to return home from work.","You were lucky enough to get an interview at a prestigious company. You knew this was a rare opportunity, and that you needed to make a good impression. However, the interview was a week away and you had little time to prepare. You talked to a few colleagues who warned you that this company gave tough interviews.","You were captain of your basketball team and your team had a big game coming up. You needed to miss the game to go to a cousin's wedding.You hadn't told your coach yet, but knew how he felt about team attendance. You needed to tell him that day.","You had always avoided heights, but when your coworkers decided to go bungee jumping for a company trip, you reluctantly agreed. After a long hike to the jumping ledge, you looked down to see that the ground was very far away. You stared at the bungee cord wondering whether it could truly hold a fall.","When you went off to college, you had to leave behind your ailing dog, Sandy. You had gotten Sandy when she was a child, and thought of her as a very close companion. Two months into college, your mom called to let you know that Sandy had died.","You were very close to your grandparents. You spent several summers at their house and always looked forward to their long talks on the phone. One morning, your mom called to tell you that your grandfather had passed away in his sleep.","Your best friend was diagnosed with stage four cancer. Your friend underwent all of the treatments his doctors suggested, but each of them failed and your friend grew more and more ill. One afternoon, your friend called to tell you that he had only three months to live.","Your dad was in the army, so your family moved cities often. Recently, you had settled down in a small town where you had finally made good friends. One day, your dad informed you that you were moving across the country again. You knew you would likely never see these friends again.","Several months after your wedding, your husband was deployed to Iraq. Two weeks before he was supposed to come home for a visit, you received a call informing you that your husband had been wounded in combat. Four hours later, he died in the hospital.","You loved your job at a small publishing company in Chicago. It was your main passion and you looked forward to work every day. One summer, your company went bankrupt and you lost your job. In the poor economy, the only job you could find was a position answering customer service queries at a call center.","For years, you and your sister had been roommates and close friends. You spent most of your time together, and there was no one that you felt as close to. One day, your sister told you that she had a job opportunity in Hong Kong and that she'd be moving away for 5 years.","Once or twice a year, you visited your high school to see your old teachers. One day, you returned to find that your favorite physics teacher was no longer at the school. You asked around and learned that the teacher was suffering from severe Alzheimer's and had deteriorated to the point of being unable to teach.","As an avid snowboarder, you frequently watched snowboarding competitions and kept track of all the star athletes. One afternoon, you learned that your favorite athlete, an emerging local superstar who was only 17 years old, had been paralyzed in a freak snowboarding accident.","You were sitting in your living room when you heard a screech and crash from the street outside your house. You and your other neighbors came pouring outside. You looked to the street to see that a neighborhood child had been hit by a car. Several hours later, the child was pronounced dead.","Your boyfriend had planned to come visit you for the weekend and you had bought tickets to see a show at your favorite theater. Thursday night, he called letting you know he couldn't come because his mother was sick with a bad flu. You wouldn't see each other for another month.","You spent all day preparing a dinner party for close friends, who you only saw one or twice a year. An hour before they were supposed to arrive, one of your friends called to let you know that the weather was too bad for them to drive.","You went to a movie remake of one of your favorite childhood books. Your friends, who had also enjoyed the books, recommended it highly. However, you thought that main characters had been cast poorly, and that the movie lost many of the subtle intricacies of the relationships and personalities in the book.","You had one day off from work this month. You planned to go to the beach that day to enjoy the last days of summer with your friends. When you woke up, it was raining. You checked the weather forecast; it was going to rain all day.","You had been a member of student council for years, and was well known for your accomplishments in student government. When you ran for class president, everyone told you would surely win. At the end of election day, the previous class president announced over the intercom that your competitor had won the election.","You hoped to become a poet, and submitted your best work to a poetry contest. The best poems would be published in an anthology, with the top 5 contestants admitted to a workshop with a world renowned poet. You received a letter telling your that your poetry had been rejected.","You and your teammates trained hard in preparation for the upcoming soccer playoffs. Your coach told you that you had a chance of winning the championship. On the first day of the playoffs, a few fluke plays put your team down 2 to 0. You lost the game, knocking yourself out of the playoffs in the first round.","Your teacher promised to take your class on a field trip to Washington D.C. to culminate your political science course. You had never been to Washington D.C. but had heard great things about the monuments and museums. However, funding cuts in the school district meant that your teacher had to cancel the trip last minute.","You had to take the trash out at work. When you got to the alleyway where the dumpster was located, you accidentally stepped in a pile of human waste. As you quickly withdrew your foot, the waste splashed up onto your bare ankles.","You were desperate to find new housing after your last minute decision to move to Boston. You chose the first place you could find on Craigslist, before even looking at the place. On your first night there, you awoke to many painful bites. You lifted up your mattress to find hundreds of bed bugs.","You volunteered to lead a mouse dissection class with a group of 4th graders. You shipped the specimens to the school, with instructions for keeping them cooled until the day of the dissection. You arrived and opened the box of mice to find that they had been left out to rot for the entire weekend.","You went away for a month-long work trip. In a rush to get to the airport in time for your flight, you left your egg salad lunch sitting out on the counter. When you returned home, you could not enter the kitchen without holding your nose.","Early Saturday morning, you went by your friend's fraternity house to drop off a package. It was the day after a party, and your feet stuck to the floor as you walked. You looked down to see a pool of vomit amongst the piles of beer cans.","While away on vacation, you let your younger brother stay in your apartment and sleep in your bed. The night you returned home, you climbed into bed and felt something rubbing against your leg. You reached under the sheets and pulled out a used condom.","You offered to help your grandmother organize her basement, which hadn't been cleaned in years. As you made your way through the piles of dusty boxes, you felt something soft and wet under your foot. You looked down to see that you had stepped in mouse droppings.","One evening, you needed to use the restroom when eating at a local chain restaurant. You were directed back through the kitchen to a small bathroom. Not only did the bathroom have no sink or soap, but you noticed that the employees did not use sanitary gloves when preparing the food.","The office next to yours hadn't been used for months. You needed to prepare the office for a new employee joining your team. You opened the door to find that the office was piled floor to ceiling with papers and trash. From the smell, you knew that food must be buried in the mess as well.","You had an acne problem. The week before your school dance, you had an especially severe breakout, which you tried to cover with makeup. When you were buying your ticket at the dance, your teacher, attempting to be helpful, told you that you had some dirt on your face and suggested you wash it off.","For weeks, you had been lost in your algebra class. One day, the teacher called on you when you had no idea what was going on. Although it was clear that you didn't know the answer, the teacher wouldn't move on. Instead, the whole class waited while you fumbled through one incorrect answer after another.","In high school, you and your boyfriend were hooking up in your basement, thinking that your parents weren't home. You then heard something and looked up to see your mother standing in the doorway. Your mother quickly turned away, but she had already seen everything.","You never wore high heels, but decided to wear them for your law school graduation ceremony. Thousands of people were present and a large monitor displayed the stage where each grad walked to receive their diploma. While in the middle of the stage, about to receive your diploma, your heel wobbled and you tripped onto the floor.","You attended a tennis camp where you met a boy and developed your first childhood crush. One day while you were doing drills, you accidentally farted as you swung your racket. You thought no one would hear, but everyone started to laugh, including your crush.","You went to the bathroom in a public restroom. It wasn't very clean, so you put down some toilet paper on the seat. As you walked out, an attractive man tapped you on the back to let you know that you had toilet paper coming out of your pants.","You swore to your roommates that you would keep your new diet. Later, you were in the kitchen getting a glass of water, and took a bite of a cake you had bought for your dinner party the following evening. Your roommates arrived home to find that you had eaten half the cake and broken your diet.","After five years as couple, your boyfriend broke up with you out of the blue. He told you he had been seeing someone else for the past year. He told you to move your belongings out of the apartment so that his new girlfriend could move in.","You loved Halloween and always looked forward to eating your candy from trick-or-treating. A few days after Halloween, you went to grab a candy from your secret stash and found that all the candy was gone. You went in your brother's room to find a pile of candy wrappers hidden under his bed.","Your husband agreed to fetch your daughter from daycare so you could work late. Instead, your husband went for drinks with coworkers and you arrived home at 11pm to find your husband asleep and your daughter missing. Not bothering to check voicemail, your husband had missed messages that your daughter was now waiting at a neighbor's home.","You were driving on a single-lane road when another car began tailgating. The driver honked and cursed at you to speed up. You wouldn't drive any faster since the road was winding and you were already 10 miles over the limit. When the road widened slightly, the car pulled around you and sped past on the left.","Your brand new computer was crashing unexpectedly. The company's website promised 100% satisfaction, but when you called in, you were told they would not replace your product. The customer service representative claimed that your problem was outside of the purchase warranty and that you would need to pay for repair yourself.","You grew up believing that it was wrong to have premarital sex. When you were fifteen years old, you got pregnant. After your small, conservative town found out, you could not even go to the supermarket without people staring and giving you dirty looks.","You were in long-term relationship with a guy you loved. While your boyfriend was away for a summer internship, a new man at work started flirting with you. One night, you went for drinks with the co-worker. You drank too much and ended up sleeping together. You knew your boyfriend would be heartbroken.","You needed a high score on your SATs to get into the college of your dreams. On the day of testing, you sat beside one of the smartest girls in the class and cheated off her on many questions. You got a perfect score. Everyone praised you for doing so well, but you always knew you didn't deserve it.","You were a new driver and wasn't comfortable parallel parking. One day, you thought you had enough room but accidentally bumped the car in back of you. In a moment of panic, you drove away without seeing if you had made a dent. You always wondered if you had done damage to that person's car.","You stayed out late drinking. You did not feel great, but figured you would drive home anyways. On your way home, you lost control of your car and hit an oncoming van. When you awoke in the hospital, you found out that you had gravely hurt the parents and killed the two children.","Your mother forbid playing in the living room where she kept fragile family heirlooms. One day, you wanted to practice cartwheels, and the living room was the only room that was big enough. Mid-cartwheel, you lost balance and your foot smashed into your mother's china shelf. You swept the broken pieces of china under the rug.","You had access to top-secret information about your company. When you changed jobs, you were frequently pressured for this information. You didn't want to harm your old company, but was eager to please your new co-workers. You eventually revealed some important trade-secrets. Afterwards, you discovered that the information would be even more damaging than you had realized.","Your friend had lost her job, but asked you not to tell anyone. Later, you were gossiping with some mutual friends, and before you knew it, you had told the group about your friend's job situation. You remembered your promise as soon as the words were out, but it was too late.","You and your classmate joined the company at roughly the same time, but worked on different teams. Both worked hard and produced high quality work, but your friend was much more successful. She was promoted every year and soon reached a manager position within the company.","After graduating law school, you went to visit a former classmate who was now working at a prestigious firm in NYC. Your friend lived in a penthouse suite with a balcony and beautiful views of Central Park. You were still living in your parents' basement to save money to pay off your law school debts.","Your best friend didn't put too much time into her schoolwork, but always performed well. You, on the other hand, worked endlessly but still struggled in math and science. At your high school graduation, your friend won awards in nearly every subject, while you graduated in the bottom half of the class.","When you were younger, you used to be the center of attention in the house. Everyone would play with you and tell you how cute you were. Then, you had a baby sister. Now, whenever your parents' friends came over, they barely noticed you and flocked to your little sister.","Your roommate came from a wealthy family. Every time there was a break from school, your roommate's parents would pay for your roommate to travel to an exotic place or take part in an expensive program that would look good on her resume. You couldn't even afford to fly home to your family in Texas.","You worked hard at school and sports, and performed reasonably well. But no matter what you did, people always brought up your older sister who had graduated two years earlier. Your sister was first in her class, very popular, and captain of three sports teams.","You and your friend played on the same field hockey team, and your friend was clearly the coach's favorite. Your friend always got to start every game and was allowed to play whatever position she wanted. You usually started on the bench, and was often stuck playing defense.","In order to work on your thesis, you returned to school in early January, before all your friends returned for the semester. For weeks, you spent all day alone in your dorm room. Your only interaction with other people was when you got up to buy a cup of coffee in the morning.","You were the youngest student in your prestigious engineering Ph.D. program. Many of your peers were older, with spouses and children. When they would return to their families each evening, you had no one to go home to. Instead, you would stay in the lab working until late into the night.","You and your husband were divorced. For many years, it was just you and your daughter in your home. When your daughter went off to boarding school in another state, you found yourself making microwave dinners for one and watching hours of TV.","You and your best friend did everything together. You would meet for coffee or drinks almost every day. Then, your friend started seeing someone, and the relationship quickly became very serious. You found yourself going directly home after work and weeks would go by without seeing your friend.","You moved to Chicago for a new job. You didn't know anyone, but thought you could make friends in your new workplace. Your boss then informed you that you would work from home because they had misjudged how much space they had in the office. You spent many hours working in your studio apartment.","Upon arriving in the US, you knew no one, and spoke very little English. You managed to get a job at a local factory, but couldn't communicate with any of your co-workers. Everyday, your co-workers would sit together eating lunch and chatting, but you could never follow the conversation.","In 8th grade, you moved to a new town. Your new school was small, and most of the students had been in classes together for years, so social groups were very well established. Each day at lunch, you would wander through the cafeteria waiting for someone to invite you to sit and eat with them.","You got a new job as a toll booth attendant on the state highway. Each morning you would leave your studio apartment to spend 10 straight hours in the tollbooth. Although you interacted with hundreds of drivers each day, hardly any of them smiled or even made eye contact.","One summer, you moved in with your aging grandfather. He lived in a rural area, far from any restaurants or bars, and you didn't know anyone your age in the area. Your grandfather was a quiet man, and would sleep most of the evening, while you perused the internet or watched movies.","When you were young, you had approached a stranger's pit-bull, wanting to pet it. The dog had bit your hand, leaving permanent scars. One day, as you were sitting on your lawn reading your book, a large pit-bull came charging towards you, growling and gnashing its teeth.","Your husband was an avid runner and was participating in the Boston Marathon. When you heard the news about a bombing at the marathon, you began calling your husband and his running partners continuously. Four hours went by and you were still unable to get in touch with your husband.","One night, your rabbit ran away from your yard. You ran after it, knowing there were coyotes roaming the woods. You ran further and further in search of your pet and, in the process, got lost in the forest. It grew dark and cold and you had lost all sense of where your house was.","There had been several recent break-ins in your neighborhood, and you were home alone while your parents were out of town. While watching TV, you thought you heard a sound from downstairs. Muting the television, you heard definitive footsteps heading up the stairs towards your room.","You and your boyfriend often broke into serious fights. One day, your boyfriend was getting particularly aggressive and threatened to hurt you. When you tried to calm him down, your boyfriend pulled out a knife, swinging it around as he shouted at you.","You were visiting Buenos Aires with your 3-year-old daughter. As you wandered through a market, you got caught up haggling over the price of an item. You looked down to find your daughter missing. You walked around the market screaming your daughter's name, but heard no answer.","One day, you thought you were the only one around the house. You put on some music while you baked a cake for your friends, and wandered around the kitchen, singing along to your favorite song. Suddenly, you heard a second voice joining in. You turned around to see that your roommate was in fact home.","Your sister lived several hours away. One weekend, you returned to your dorm room after a long week of work. A few minutes later, you heard a knock on the door. You opened it to see your sister standing on the doorstep. She had driven across the state to visit for the weekend.","You were watching a baseball game with your brother. When you left the stadium after the 5th inning, one of the teams was winning 21 to 3. You later heard on the news that the other team had recovered in the last few innings and won the game.","After defending your Ph.D., you headed home to spend the evening with your husband. As you walked down the hallway, you thought you heard voices in your apartment. You opened the door to find that your family, advisors and graduate student colleagues had all gathered at your home to celebrate.","You lived in Los Angeles, where it was usually warm all year long. One December, you were walking home from work in a t-shirt and shorts. You felt something cold and wet on your cheek. You looked up to see flurries of snowflakes falling to the ground around you.","You were on a business trip in Beijing and was walking around downtown during your lunch break. While waiting in line for the bathroom, you felt a tap on your shoulder. You turned to see a childhood friend from the USA. It turned out your friend had been living in Beijing for a year.","A big fan of film, you always watched the Oscar awards on TV. All the critics had predicted that Best Actor would go to a renowned star whose recent performance had been a blockbuster hit. Instead, the award was given to a 17-year-old actor for his debut hollywood performance.","You were tidying up around the house and asked your daughter to put away the Barbie dolls that were on the floor. Your daughter said they weren't hers but belonged to your 8-year-old son, Tommy. Tommy agreed they were his new favorite toys, and put them away in his room.","You always had your hair cut by the same stylist in your city. One day, you asked your stylist if she had worked anywhere previously. Your stylist told you she used to be a physics professor at MIT, but gave up her career in science to do hairstyling.","You were reading the second to last book in a series about a small town in Indiana. The book had a pleasant plot and each of the characters was unique and well developed. In the last chapter of the book, a tornado struck the town and all the main characters were killed.","You enjoyed painting but rarely found the time in your busy college schedule. One summer, you decided to make time for painting again, and signed up for a class with your friend. Each week, you'd spend a full evening painting scenes of the parks and gardens around your home.","You were a great cook and often made food for friends as a way to wind down after a long day. You decided to host Thanksgiving for the first time. You bought a turkey and festive decorations, and started preparing pies two days beforehand. You watched as your guests enjoyed themselves and the food.","After a long day at work, you were looking forward to a quiet evening alone in your studio apartment. You made a fire and a cup of tea and sat in your most comfortable chair, catching up on the news and your favorite blogs.","One fall, you visited a city you'd never been to before. It was a crisp, fall afternoon, and you spent the day meandering around the neighborhoods. The quiet side streets were full of bookstores, coffee shops and galleries. You thought these would be great places to spend the day with a book or magazine.","When you would visit your mother at the nursing home, it was change of pace from your usual hectic lifestyle. Each visit, you would bring along a new 1000 piece jigsaw puzzle and spend all day working on the puzzle with your mother.","Every morning in the summer, you would get up early and go for a long run by the river. You would see the sun rising over the river as you started your run, and feel its warmth on your back as you finished and lay down in the grass to recover.","Because your apartment didn't allow pets, you volunteered at a local animal shelter. Once a week, you would spend the afternoon taking the dogs out for walks. You would run around chasing them at the park and spend hours throwing a ball for them to fetch.","You loved the Hunger Games book series. Every time a new book came out, you would read it within 24 hours. The last installation had ended very unresolved, and you couldn't imagine what would happen next. The final installation was going on sale in 3 days.","Each year, your father took your older brothers on a hiking trip. You always wanted to go, but was too young. A few nights before the trip, your father came into your room and told you he'd decided you were ready. He gave you a backpack and told you to start packing.","You had always loved looking at photographs of the beautiful Caribbean, but had never been able to visit yourself. After getting a bonus at work, you decided to treat yourself to a vacation. When planning for the trip, you perused travel websites filled with beautiful photographs of oceans and palm trees.","You were a huge baseball fan, and knew all about the players on your local major league team. At a charity event, you won a chance to meet your favorite player after an upcoming game. During all your years of obsessing over this player, you never dreamed you would have the chance to meet him in person.","You were an avid dancer, and particularly loved dressing up in fancy clothes. Prom was in two days, and you were going with a guy you really liked. Your dress, already laid out on your dressing table, was a perfect fit, and you combed through magazines deciding on your favorite up-do style to show to your hairstylist.","You loved steep roller-coasters but hadn't been able to go on the biggest one in the local amusement park because you didn't meet the height limit. That summer, you were finally tall enough. You watched footage of other riders screaming and yelling as you waited in line for the famous ride.","After 6 weeks of training to scuba-dive in your university's pool, you were finally certified to dive. That weekend, you were headed to a famous reef a few hours away. You would see thousands of species of fish, and some of the most elaborate coral found anywhere in the world.","You were texting while driving. You went through a red light and hit a boy on a bike. You jumped out of the car to see if the boy was okay. He had a couple scrapes, but, somehow, was otherwise okay. You put away your phone and vowed to never text while driving again.","You had Cystic Fibrosis and all of your treatments were failing. A new medication had just come out that would effectively target your condition, but you could not afford it. One day, you received a package in the mail with nothing but that necessary medication. The return address was that of your doctor.","You had been in a concentration camp for three years. You were emaciated, starved and weak. One morning, you propped up your head to see American soldiers filing into the camp. You immediately received food and medical care and, one week later, was freed from the camp.","You were having financial difficulties after graduating from college. You worked over-time and lived very meagerly, but still had trouble making your loan payments. One day, you received a letter from your grandfather saying that he wanted to help. A check for 8,000 was enclosed.","You were struggling with biochemistry. After your first exam, your lab partner asked if you wanted some help. Without asking for anything in return, he met with you several times a week for the rest of the semester, working through the material until you really understood it. You received an A on the final exam.","You were staying in a homeless shelter while looking for a job. Your 3 weeks of free housing were almost up, but you remained unemployed. The night before you were required to move out, the manager came by to tell you that you could stay an extra two weeks to get things settled.","When your apartment building burnt down in a fire, you thought you'd be stuck without a place to stay for weeks as you looked for a new apartment. But within hours, friends from all over the city had contacted you offering their couches and spare bedrooms for as long as you needed.","While your husband was out of town on business, you came down with a bad flu, leaving no one to watch your three young children during the day. A neighbor heard that you were sick and called up offering to take the kids for the week, giving you a chance to rest and recover.","Your son had a severe learning disability and received little support from his school. His teachers didn't know what to do with him, and were often frustrated by him in the classroom. But that year, a teacher had taken a special interest in your son and spent several afternoons each week tutoring your son after school.","You went into an interview at a prominent publishing firm. You met with the Chief Editor, who commented that your resume was a remarkably good fit for the position. At the end of the interview, the man shook your hand and told you that he would personally be in touch with you.","You really wanted the Harry Potter books for Christmas. You wrote Santa Claus a letter telling him how good you had been, and baked cookies for him on Christmas Eve. In your mother's room, you saw a pile of book shaped packages sitting on the floor.","You had a bad experience at the first college you attended and decided to transfer to a college that better fit your interests. The first day of school was a bright, crisp fall day, and leaves crinkled under your feet as you stepped through the gate into your new home.","You had been on OKCupid for several months, but never hit it off with anyone. One day, you went for drinks with a man you found attractive and interesting. You stayed talking late into the night. When you eventually left the restaurant, the man asked for your number.","Your father had been sick for months, and no treatment seemed to be helping. As a last resort, his doctor prescribed a new experimental medication. Although it would take weeks to determine whether the drug was truly effective, your father appeared to improve within the first few days.","For your birthday, you were hosting a picnic at a park nearby. April was a rainy month in your region, so you checked the weather report every day to see the forecast for your birthday. For the 3 days leading up to the party, the forecast predicted sun and warm temperatures.","You were visiting a friend who was now a Ph.D. student in neuroscience. You decided to sit in on a talk he was giving. Your friend spoke passionately and articulately, and seemed to have expertise in every area of neuroscience and neurobiology. You hadn't known what an expert your friend had become.","You ran into a friend you had not seen in months. Your friend had often struggled with weight but was now looking exceptionally fit. When you asked what she was doing to look so good, your friend replied that she had gotten serious about biking and was doing 70-mile rides on the weekends.","Each year, you taught computer science to high school students. Usually the students were slow to grasp the material, and few managed to write full computer scripts by the end of the week-long workshop. This year, a student with no prior training learned all the material you taught, and built a fully functional web application.","The track team you coached had been regional champions the previous year. At the pre-season tryout race, a freshman bolted out to the front of the pack. You were sure the overzealous youngster would tire out and fall behind, perhaps not even finish. Instead, he finished in first, ahead of the team's top runners.","One day, you were scrolling through Facebook when you saw a post from an old cross-country teammate. It was a photo of your friend at the peak of Mt. Everest. Evidently your teammate had trained for months and completed the climb without oxygen or guides.","Your venture capital firm frequently met with promising startups, but you were usually hesitant to invest in companies if the employees were too young or inexperienced. One day, you met with two college sophomores who pitched a new idea for a web app. You could tell they would pull it off, despite their limited experience.","You had been accepted to many medical schools, but deep down only wanted to go to Harvard. Not only was it a great department, but it would allow you to remain in Cambridge where your boyfriend was enrolled in law school. One afternoon, you opened a letter from Harvard Medical School stating that you had been accepted.","You and your husband recently moved into a new apartment and decided you were ready to start a family. You woke up one morning feeling very queasy and nauseous. You decided to take a pregnancy test and quickly ran to the pharmacy. The test result was positive.","You and your boyfriend started as best friends, and had been dating for over 6 years. You were completely in love and you knew he was the one for you. One summer evening, as you finished dinner at their favorite restaurant, your boyfriend got down on one knee and proposed.","You were in a tight race for class president. You were the most qualified, but your competitor was captain of the football team and had popularity on his side. On election day, a number of football players skipped school to see a new football movie, allowing you to win by 7 votes.","When you were 16, you fled your home country in pursuit of a better life. You were able to build a life for yourself and your brother in the USA, but you had left your parents behind. Finally, your parents were able to get papers to join you in the United States, reuniting the family after 12 years.","You and your husband had been married for 50 years. On your anniversary day, you gathered with your 4 sons and your sons' children. You renewed the vows, looked through photo albums capturing your many years together as a couple, and danced the night away with your loved ones.","After months of job hunting, you and your husband were finally able to move to San Diego and buy a house for the family. The first night in your new home, you cooked up your husband's favorite dish and you ate dinner together on your new patio, while the kids played soccer in lawn.","You and your friends went to watch a comedian who had been a childhood acquaintance of yours. The comedian was from your hometown and told jokes that reminded you of the humorous idiosyncrasies of the small community in which you grew up.","You went to the zoo on your day off from work. You sat in front of the monkey exhibit for half an hour, watching the monkeys swing from branch to branch. It made you think of the times you spent playing on the jungle gym as a child.","You and your childhood friend bought tickets to a concert for a band you had obsessed over in middle school. You knew the words to every song because you had spent too many hours dressing up, dancing, and playing karaoke to this music when you were young.","For your 10 year reunion, you returned to your college campus for the first time since graduation. You walked through the halls of your old dormitory, had lunch in your favorite dining hall, and sat in the library where you had spent endless late nights studying.","You grew up in New York City but had lived in suburban Texas for years. You would often watch movies set in NYC, reminding yourself of the urban lifestyle you had left behind: the crowded streets, the bustling markets, and the parks full of diverse people.","One summer, you visited your grandparents' house where you used to play as a child. In their yard, there was a treehouse that your grandfather had built for your 5th birthday. You climbed up inside and remembered how tall and intimidating the treehouse used to feel.","At the grocery store, you ran into an old neighbor who had long since moved away. You chatted for half an hour, telling stories and reminding each other of the mischief you had caused with your adventures around the neighborhood during your youth.","For your son's 7th birthday, you took him to a Redsox game. You bought plastic horns to blow on, and munched on popcorn and hotdogs. You thought the hotdogs tasted just as good as they had when your father had taken you to Redsox games as a child.","In September, you joined a small ophthalmology clinic for your first job after medical school. You worked hard to develop relationships with your patients and to recruit new clients to the clinic. By May, you had doubled the company's
